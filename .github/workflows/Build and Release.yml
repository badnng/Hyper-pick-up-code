name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEY_STORE_PATH: app/release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Check if pre-release
        id: check_prerelease
        run: |
          BRANCH=$(git branch -r --contains ${{ github.sha }} | head -1 | sed 's/.*origin\///' | xargs)
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == "dev" ]] || [[ "$BRANCH" == "Dev" ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "json_file=Dev.json" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "json_file=stable.json" >> $GITHUB_OUTPUT
          fi

      - name: Read changelog
        id: changelog
        run: |
          if [ -f changelog.txt ]; then
            CHANGELOG=$(cat changelog.txt)
            echo "content<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGELOG" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "content=无更新日志" >> $GITHUB_OUTPUT
          fi

      - name: Generate version JSON
        run: |
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '\d+')
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | grep -oP '"[^"]*"' | tr -d '"')
          TAG_NAME=${{ github.ref_name }}
          JSON_FILE=${{ steps.check_prerelease.outputs.json_file }}
          CHANGELOG=$(cat changelog.txt | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/"/\\"/g')

          cat > $JSON_FILE << EOF
          {
            "versionCode": $VERSION_CODE,
            "versionName": "$VERSION_NAME",
            "releaseNotes": "$CHANGELOG",
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/app-release.apk"
          }
          EOF

      - name: Commit JSON to master
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          JSON_FILE=${{ steps.check_prerelease.outputs.json_file }}

          # 先把生成的 JSON 存到临时目录
          cp $JSON_FILE /tmp/$JSON_FILE

          # 切到 master
          git checkout master

          # 从临时目录复制过来
          cp /tmp/$JSON_FILE $JSON_FILE

          git add $JSON_FILE
          git diff --cached --quiet || git commit -m "Update $JSON_FILE for ${{ github.ref_name }}"
          git push origin master
          
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          body: |
            ## 更新内容
            ${{ steps.changelog.outputs.content }}
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
