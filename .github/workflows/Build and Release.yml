name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.jks

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEY_STORE_PATH: app/release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Check if pre-release
        id: check_prerelease
        run: |
          BRANCH=$(git branch -r --contains ${{ github.sha }} | head -1 | sed 's/.*origin\///' | xargs)
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" == "dev" ]] || [[ "$BRANCH" == "Dev" ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "json_file=Dev.json" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "json_file=stable.json" >> $GITHUB_OUTPUT
          fi

      # 生成对应的 JSON
      - name: Generate version JSON
        run: |
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | head -1 | grep -oP '\d+')
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"$$.*$$".*/\1/')
          TAG_NAME=${{ github.ref_name }}
          JSON_FILE=${{ steps.check_prerelease.outputs.json_file }}

          cat > $JSON_FILE << EOF
          {
            "versionCode": $VERSION_CODE,
            "versionName": "$VERSION_NAME",
            "releaseNotes": "请查看 Release 页面获取更新日志",
            "downloadUrl": "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/app-release.apk"
          }
          EOF

          echo "Updated $JSON_FILE with versionCode=$VERSION_CODE versionName=$VERSION_NAME"

      # 把 JSON 提交回 master 分支
      - name: Commit JSON to master
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # 切到 master 分支
          git checkout master

          # 把生成的 JSON 复制过来
          cp ${{ github.workspace }}/${{ steps.check_prerelease.outputs.json_file }} .

          JSON_FILE=${{ steps.check_prerelease.outputs.json_file }}
          git add $JSON_FILE
          git diff --cached --quiet || git commit -m "Update $JSON_FILE for ${{ github.ref_name }}"
          git push origin master

      # 创建 Release
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
